<div class="dialog-container">
  <!-- Close Button -->
  <button mat-icon-button class="dialog-close-btn" mat-dialog-close aria-label="Close dialog">
    <mat-icon>close</mat-icon>
  </button>

  <div *ngIf="chartType === 'pie'" class="chart-content-wrapper">
    <div>
      <p class="categorypara text-center fw-bold">Expense Breakdown by Category</p>
    </div>

    <div *ngIf="pieChartLabels.length===0" class="empty-state">
      <p class="m-0">No expenses recorded yet.</p>
      <button mat-raised-button color="primary" (click)="onHome()" class="mt-2 mb-3">Add Expense</button>

      <!-- CSS Pulse Loader Animation replacing pie22.gif -->
      <div class="empty-chart-illustration">
        <div class="circle-illustration-indigo">
          <mat-icon class="large-icon">pie_chart</mat-icon>
        </div>
      </div>
    </div>

    <div class="pieChart" *ngIf="pieChartLabels.length > 0">
      <canvas baseChart id="myCanvas" [type]="'pie'" [datasets]="pieChartDatasets" [labels]="pieChartLabels"
        [options]="pieChartOptions" [plugins]="pieChartPlugins" [legend]="pieChartLegend">
      </canvas>

      <!-- Details Table -->
      <div class="chart-details-table mt-4">
        <table class="table table-sm table-hover align-middle border">
          <thead class="table-light">
            <tr>
              <th>Category</th>
              <th class="text-end">Amount</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let label of pieChartLabels; let i = index">
              <td>
                <span class="color-dot" [style.background-color]="pieColors[i % pieColors.length]"></span>
                {{ label }}
              </td>
              <td class="text-end fw-bold">₹{{ pieChartDatasets[0].data[i] | number:'1.2-2' }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div *ngIf="chartType === 'bar'" class="chart-content-wrapper">
    <div>
      <p class="categorypara text-center fw-bold">Monthly Spending Trend</p>
    </div>
    <div class="d-flex justify-content-center mb-3">
      <mat-form-field appearance="outline" class="w-50">
        <mat-label>Select Year</mat-label>
        <mat-select [(value)]="selectedYear" (selectionChange)="onSelectionChange($event)">
          <mat-option [value]="year" *ngFor="let year of years">{{year}}</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div *ngIf="selectedYear===''" class="empty-state">
      <p class="m-0">Select a year to see monthly details.</p>

      <!-- CSS Pulse Loader Animation replacing nobar.gif -->
      <div class="empty-chart-illustration">
        <div class="circle-illustration-gold">
          <mat-icon class="large-icon">bar_chart</mat-icon>
        </div>
      </div>
    </div>

    <div class="barChart" *ngIf="selectedYear!==''">
      <canvas id="myBarCanvas" baseChart [data]="barChartData" [options]="barChartOptions" [plugins]="barChartPlugins"
        [legend]="barChartLegend" [type]="'bar'">
      </canvas>
    </div>
  </div>
</div>
