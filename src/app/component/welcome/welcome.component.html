<mat-drawer-container
  class="example-container"
  hasBackdrop="True"
  autosize
  style="height: 100vh"
>

  <!-- nav side bar -->

  <mat-drawer style="height: 100%" #drawer class="example-sidenav" mode="over">

    <!-- title -->

    <h2
      style="
        border-bottom: 2px solid red;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      "
    >
      Expense Tracker
    </h2>
    <div>

      <!-- sign up or login by ngif -->

      <div>
        <div style="margin-top: 20px" *ngIf="isLogging">
          <button mat-raised-button color="primary" (click)="onSignUp()">
            <mat-icon>perm_identity</mat-icon>Sign Up
          </button>
        </div>
        <div style="margin-top: 20px" *ngIf="!isLogging">
          <button mat-raised-button color="primary" (click)="onLogin()">
            <mat-icon>login</mat-icon>Login
          </button>
        </div>

        <!-- links of github and linkdin -->

        <div style="margin-top: 20px">
          <button
            mat-button
            class="example-icon favorite-icon"
            aria-label="Example icon-button with heart icon"
            (click)="onGithub()"
          >
            <img
              src="../../../assets/image/github.png"
              height="50px"
              width="50px"
            />
          </button>
          <button
            mat-button
            class="example-icon"
            aria-label="Example icon-button with share icon"
            (click)="onLinkedin()"
          >
            <img
              src="../../../assets/image/linkedin.png"
              height="30px"
              width="30px"
            />
          </button>
        </div>
      </div>
    </div>

    <!-- version of application -->


    <div *ngIf="appVersion != ''" style="margin-top: 20px; font-size: 12px">
      <p (copy)="(false)">Application Version: {{ appVersion }}</p>
    </div>
  </mat-drawer>
  <div>


    <!-- top bar menu -->


    <mat-toolbar style="border-bottom: 1px solid black">

      <!-- side menu bar toggle -->
      <button
        mat-icon-button
        class="example-icon"
        (click)="drawer.toggle()"
        aria-label="Example icon-button with menu icon"
      >
        <mat-icon>menu</mat-icon>
      </button>
      <span>Expense Tracker</span>
      <span class="example-spacer"></span>
      <button
        mat-mini-fab
        class="example-icon favorite-icon"
        aria-label="Example icon-button with heart icon"
        matTooltip="Sign Up"
        (click)="onSignUp()"
        *ngIf="isLogging"
      >
        <mat-icon>perm_identity</mat-icon>
      </button>
      <button
        mat-raised-button
        class="example-icon favorite-icon"
        aria-label="Example icon-button with heart icon"
        matTooltip="Login"
        (click)="onLogin()"
        *ngIf="!isLogging"
        color="accent"
      >
        <mat-icon>login</mat-icon>
        Login
      </button>
    </mat-toolbar>
  </div>

  <!-- switching between login and signup -->


  
  <div *ngIf="isLogging">
    <div>
      <app-login></app-login>
    </div>
  </div>
  <div *ngIf="!isLogging">
    <app-signup></app-signup>
  </div>
</mat-drawer-container>
